custom_rules:
  - profiles/neut-library/design_library.smk

lat-longs: "config/lat_longs.tsv"

segments:
  - ha

tree:
  tree-builder-args: "'-ninit 10 -n 4 -czb'"

submission_date_field: date_submitted
recency:
  date_bins: [7, 30, 90]
  date_bin_labels: ["last week", "last month", "last quarter"]
  upper_bin_label: older

min_ha1_coverage: 0.75

builds:
    h3n2:
      lineage: h3n2
      distance_maps:
        - "config/distance_maps/h3n2/ha/wolf.json"
        - "config/distance_maps/h3n2/ha/koel.json"
      recurrent_substitutions_map: "profiles/neut-library/h3n2_recurrent_substitutions.json"
      mutation_weights:
        glycosylation_mutations: 0
        HA1_mutations: 1
        recurrent_substitutions: 3
        wolf_mutations: 3
        koel_mutations: 4
      reference: "profiles/neut-library/nextclade_h3n2/reference.fasta"
      annotation: "profiles/neut-library/nextclade_h3n2/genome_annotation.gff3"
      clades: "config/h3n2/ha/clades.tsv"
      subclades: "config/h3n2/{segment}/subclades.tsv"
      auspice_config: "config/h3n2/{segment}/auspice_config.json"
      subsamples: &subsampling
        global:
            filters: --min-date 2025-12-01 --exclude-ambiguous-dates-by month --exclude config/{lineage}/outliers.txt --exclude-where 'ha!=True' 'passage_category=egg' --query "\`qc.overallStatus_ha\` == 'good'"
    h1n1pdm:
      lineage: h1n1pdm
      distance_maps:
        - "config/distance_maps/h1n1pdm/ha/canton.json"
      recurrent_substitutions_map: "profiles/neut-library/h1n1pdm_recurrent_substitutions.json"
      mutation_weights:
        glycosylation_mutations: 0
        HA1_mutations: 1
        recurrent_substitutions: 3
        canton_mutations: 3
      reference: "profiles/neut-library/nextclade_h1n1pdm/reference.fasta"
      annotation: "profiles/neut-library/nextclade_h1n1pdm/genome_annotation.gff3"
      clades: "config/h1n1pdm/ha/clades.tsv"
      subclades: "config/h1n1pdm/{segment}/subclades.tsv"
      auspice_config: "config/h1n1pdm/{segment}/auspice_config.json"
      subsamples: *subsampling
